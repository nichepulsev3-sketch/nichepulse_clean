name: CI

# Fase 13 del roadmap de arquitectura. Corre en cada push/PR: typecheck,
# lint y tests. NO despliega nada — Railway sigue siendo quien construye
# y despliega a producción de forma independiente. El único objetivo de
# este workflow es dar feedback en el PR antes de hacer merge, en vez de
# descubrir un error de tipos o un test roto ya en el log de build de
# Railway (que es como se ha diagnosticado cada incidente hasta ahora).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Sin cache: 'npm' a propósito — todavía no existe un
          # package-lock.json commiteado (ver nota de abajo), y esa opción
          # de actions/setup-node requiere un lockfile para calcular la
          # clave de caché o falla el step.

      # No usamos `npm ci` porque ese comando exige un package-lock.json
      # ya commiteado (falla si no existe) — este proyecto todavía no
      # tiene uno. `npm install` funciona sin él y genera/actualiza el
      # lockfile. Recomendado para v4.0: commitear package-lock.json y
      # cambiar esto a `npm ci` para builds 100% reproducibles.
      - name: Instalar dependencias
        run: npm install --no-audit --no-fund

      - name: Comprobar tipos (TypeScript)
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test
